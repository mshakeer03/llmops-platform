global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Phase 5.2.2 — Alert rule files ───────────────────────────────────────────
rule_files:
  - /etc/prometheus/alert-rules.yml

# ── Phase 5.2.2 — Alertmanager integration ───────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # LLMOps platform API — exposes /metrics (Prometheus text format)
  - job_name: llmops-api
    static_configs:
      - targets: ["api:8001"]
    metrics_path: /metrics
    scrape_interval: 10s
