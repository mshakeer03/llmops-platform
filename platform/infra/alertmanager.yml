# =============================================================================
#  LLMOps Platform — Alertmanager Configuration
#  Phase 5.2.2
#
#  Out-of-the-box this uses a "null" (log-only) receiver so Alertmanager
#  starts cleanly with no external dependencies.
#
#  To enable notifications:
#    1. Uncomment the desired receiver section(s) below.
#    2. Fill in the placeholder values with real credentials.
#    3. Change receiver: 'null' → 'slack' or 'email' in the routing tree.
#    4. Restart:  podman-compose restart alertmanager
#
#  When using Docker Compose with --config.expand-env Alertmanager substitutes
#  ${VAR} at startup, so set the vars in platform/.env and reference them here.
# =============================================================================

global:
  resolve_timeout: 5m

# ── Routing tree ─────────────────────────────────────────────────────────────
route:
  group_by:        ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 3h
  receiver:        'null'     # change to 'slack' or 'email' once configured

  routes:
    # Critical alerts fire more often
    - matchers:
        - severity = "critical"
      receiver:        'null'   # change to 'slack' or 'email' once configured
      repeat_interval: 1h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:

  # ── Default: no-op sink (safe to keep even when other receivers are active) ──
  - name: 'null'

  # ── Slack ────────────────────────────────────────────────────────────────────
  # 1. Create Incoming Webhook → https://api.slack.com/messaging/webhooks
  # 2. Set ALERTMANAGER_SLACK_WEBHOOK=https://hooks.slack.com/services/... in .env
  # 3. Change 'null' → 'slack' in the routing tree above.
  #
  # - name: 'slack'
  #   slack_configs:
  #     - api_url:       '${ALERTMANAGER_SLACK_WEBHOOK}'
  #       channel:       '#llmops-alerts'
  #       send_resolved: true
  #       title:         '{{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}'
  #       text: >-
  #         *Alert:* {{ .CommonAnnotations.summary }}
  #
  #         {{ .CommonAnnotations.description }}
  #
  #         Labels:{{ range .CommonLabels.SortedPairs }} `{{ .Name }}={{ .Value }}`{{ end }}

  # ── Email (SMTP) ─────────────────────────────────────────────────────────────
  # Set these in platform/.env then uncomment:
  #   ALERTMANAGER_SMTP_HOST=smtp.example.com:587
  #   ALERTMANAGER_SMTP_FROM=alerts@example.com
  #   ALERTMANAGER_EMAIL_TO=oncall@example.com
  #
  # - name: 'email'
  #   email_configs:
  #     - smarthost:    '${ALERTMANAGER_SMTP_HOST}'
  #       from:         '${ALERTMANAGER_SMTP_FROM}'
  #       to:           '${ALERTMANAGER_EMAIL_TO}'
  #       send_resolved: true
  #       headers:
  #         Subject: '[LLMOps] {{ .Status | toUpper }} — {{ .CommonAnnotations.summary }}'

# ── Inhibition rules ──────────────────────────────────────────────────────────
inhibit_rules:
  # When no engines are running, suppress the queue-depth alert
  # (queue will always be non-zero when there are no workers)
  - source_matchers:
      - alertname = "NoActiveEngines"
    target_matchers:
      - alertname = "EngineQueueBackpressure"
    equal: ['team']
