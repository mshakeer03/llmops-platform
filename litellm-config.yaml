model_list:
  # Qwen 0.5B - Tiny and fast
  - model_name: qwen-0.5b
    litellm_params:
      model: openai/Qwen/Qwen2.5-0.5B-Instruct
      api_base: http://host.containers.internal:9000/v1
      api_key: dummy-key
      
  # Facebook OPT 125M - Ultra lightweight
  - model_name: opt-125m
    litellm_params:
      model: openai/facebook/opt-125m
      api_base: http://host.containers.internal:9001/v1
      api_key: dummy-key
      
  # Meta Llama 3.2 3B - Balanced power
  - model_name: llama-3b
    litellm_params:
      model: openai/meta-llama/Llama-3.2-3B-Instruct
      api_base: http://host.containers.internal:9002/v1
      api_key: dummy-key
      
  # Mistral 7B - Most capable
  - model_name: mistral-7b
    litellm_params:
      model: openai/mistralai/Mistral-7B-Instruct-v0.3
      api_base: http://host.containers.internal:9003/v1
      api_key: dummy-key

# General settings
general_settings:
  master_key: sk-local-vllm-poc-123
  
# Optional: Enable request logging for debugging
litellm_settings:
  success_callback: []
  failure_callback: []
  litellm_log: debug
